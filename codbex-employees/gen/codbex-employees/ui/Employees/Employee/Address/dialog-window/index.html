<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="page" ng-controller="PageController">

    <head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="view.js"></script>
        <meta name="platform-links" category="ng-view">
		<script type="text/javascript" src="/services/web/dashboard/services/entity.js"></script>
        <script type="text/javascript" src="controller.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-scrollbar class="bk-full-height">
            <bk-fieldset class="fd-padding-begin-end--sm" ng-form="forms.details">
                <bk-form-group label="{{formHeaders[action]}}" name="entityForm" transclude-classes="fd-container fd-form-layout-grid-container">
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idCountry" ng-required="true" colon="true">{{ 'codbex-employees:codbex-employees-model.t.ADDRESS_COUNTRY' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4 fd-col--6">
	                        <bk-combobox-input input-id="idCountry"
	                            name="Country"
	                            state="{{ forms.details['Country'].$valid ? '' : 'error' }}"
	                            ng-required="true"
	                            ng-model="entity.Country"
	                            is-readonly="action === 'select'"
	                            dropdown-items="optionsCountry"
	                            placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputSearch' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.ADDRESS_COUNTRY)'} }}"
								btn-aria-label="{{ 'codbex-employees:codbex-employees-model.aria.showHide' | t:{'name':'Country'} }}" list-aria-label="{{ 'codbex-employees:codbex-employees-model.aria.options' | t:{'name':'Country'} }}">
	                        </bk-combobox-input>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idCity" ng-required="true" colon="true">{{ 'codbex-employees:codbex-employees-model.t.ADDRESS_CITY' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4 fd-col--6">
	                        <bk-combobox-input input-id="idCity"
	                            name="City"
	                            state="{{ forms.details['City'].$valid ? '' : 'error' }}"
	                            ng-required="true"
	                            ng-model="entity.City"
	                            is-readonly="action === 'select'"
	                            dropdown-items="optionsCity"
	                            placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputSearch' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.ADDRESS_CITY)'} }}"
								btn-aria-label="{{ 'codbex-employees:codbex-employees-model.aria.showHide' | t:{'name':'City'} }}" list-aria-label="{{ 'codbex-employees:codbex-employees-model.aria.options' | t:{'name':'City'} }}">
	                        </bk-combobox-input>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idAddress" ng-required="true" colon="true">{{ 'codbex-employees:codbex-employees-model.t.ADDRESS_ADDRESS' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4 fd-col--6">
							<bk-form-input-message
								state="{{ forms.details['Address'].$valid ? '' : 'error' }}"
								text="{{ 'codbex-employees:codbex-employees-model.messages.error.lengthMax' | t:{'max':'255.0'} }}">
								<bk-input id="idAddress"
	                                name="Address"
	                                state="{{ forms.details['Address'].$valid ? '' : 'error' }}"
									ng-required="true"
	                                ng-model="entity.Address"
	                                ng-readonly="action === 'select'"
									ng-maxlength="255.0"
	                                type="text"
	                                placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputEnter' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.ADDRESS_ADDRESS)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idPostalCode" ng-required="true" colon="true">{{ 'codbex-employees:codbex-employees-model.t.ADDRESS_POSTALCODE' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4 fd-col--6">
							<bk-form-input-message
								state="{{ forms.details['PostalCode'].$valid ? '' : 'error' }}"
								text="{{ 'codbex-employees:codbex-employees-model.messages.error.lengthMax' | t:{'max':'12.0'} }}">
								<bk-input id="idPostalCode"
	                                name="PostalCode"
	                                state="{{ forms.details['PostalCode'].$valid ? '' : 'error' }}"
									ng-required="true"
	                                ng-model="entity.PostalCode"
	                                ng-readonly="action === 'select'"
									ng-maxlength="12.0"
	                                type="text"
	                                placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputEnter' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.ADDRESS_POSTALCODE)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                </bk-form-group>
            </bk-fieldset>
        </bk-scrollbar>

		<bk-bar bar-design="footer" compact="true" ng-show="action !== 'select'">
			<bk-bar-right>
				<bk-bar-element>
					<bk-button ng-if="action === 'create'" label="{{'codbex-employees:codbex-employees-model.defaults.create' | t}}" state="emphasized" ng-click="create()" ng-disabled="!forms.details.$valid"></bk-button>
					<bk-button ng-if="action !== 'create'" label="{{'codbex-employees:codbex-employees-model.defaults.update' | t}}" state="emphasized" ng-click="update()" ng-disabled="!forms.details.$valid"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-employees:codbex-employees-model.defaults.cancel' | t }}" ng-click="cancel()"></bk-button>
				</bk-bar-element>
			</bk-bar-right>
		</bk-bar>
		<theme></theme>
    </body>

</html>
