<!DOCTYPE HTML>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" ng-app="page" ng-controller="PageController">

    <head>
		<meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="icon" sizes="any" href="data:;base64,iVBORw0KGgo=">
        <title config-title></title>
        <script type="text/javascript" src="view.js"></script>
        <meta name="platform-links" category="ng-view">
        <script type="text/javascript" src="controller.js"></script>
    </head>

    <body class="bk-vbox">
        <bk-scrollbar class="bk-full-height">
			<bk-message-strip class="fd-margin--md" ng-show="errorMessage" glyph="sap-icon--message-error" state="error" on-dismiss="clearErrorMessage()">{{ errorMessage }}</bk-message-strip>

            <bk-fieldset class="fd-padding-begin-end--sm" ng-form="forms.details">
                <bk-form-group label="{{ 'codbex-employees:codbex-employees-model.defaults.formGrpFilter' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.CONTACT)'} }}" name="entityForm" transclude-classes="fd-container fd-form-layout-grid-container">
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idPhoneNumber" colon="true">{{ 'codbex-employees:codbex-employees-model.t.CONTACT_PHONENUMBER' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4">
							<bk-form-input-message state="{{ forms.details['PhoneNumber'].$valid ? '' : 'error' }}" text="{{'codbex-employees:codbex-employees-model.messages.error.incorrectInput' | t}}">
								<bk-input id="idPhoneNumber"
	                                name="PhoneNumber"
	                                state="{{ forms.details['PhoneNumber'].$valid ? '' : 'error' }}"
	                                ng-model="entity.PhoneNumber"
									ng-maxlength="20.0"
	                                type="tel"
	                                placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputEnter' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.CONTACT_PHONENUMBER)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                    <bk-form-item class="fd-row">
                    	<div class="fd-col fd-col-md--2">
                        	<bk-form-label for="idEmail" colon="true">{{ 'codbex-employees:codbex-employees-model.t.CONTACT_EMAIL' | t }}</bk-form-label>
                        </div>
                        <div class="fd-col fd-col-md--4">
							<bk-form-input-message state="{{ forms.details['Email'].$valid ? '' : 'error' }}" text="{{'codbex-employees:codbex-employees-model.messages.error.incorrectInput' | t}}">
								<bk-input id="idEmail"
	                                name="Email"
	                                state="{{ forms.details['Email'].$valid ? '' : 'error' }}"
	                                ng-model="entity.Email"
									ng-maxlength="255.0"
	                                type="email"
	                                placeholder="{{ 'codbex-employees:codbex-employees-model.messages.inputEnter' | t:{'name':'$t(codbex-employees:codbex-employees-model.t.CONTACT_EMAIL)'} }}">
	                            </bk-input>
							</bk-form-input-message>
	                    </div>
                    </bk-form-item>
                </bk-form-group>
            </bk-fieldset>
        </bk-scrollbar>

        <bk-bar bar-design="footer" compact="true" ng-show="action !== 'select'">
			<bk-bar-right>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-employees:codbex-employees-model.defaults.filter' | t }}" state="emphasized" ng-click="filter()"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-employees:codbex-employees-model.defaults.reset' | t }}" ng-click="resetFilter()"></bk-button>
				</bk-bar-element>
				<bk-bar-element>
					<bk-button label="{{ 'codbex-employees:codbex-employees-model.defaults.cancel' | t }}" ng-click="cancel()"></bk-button>
				</bk-bar-element>
			</bk-bar-right>
		</bk-bar>
		<theme></theme>
    </body>

</html>
